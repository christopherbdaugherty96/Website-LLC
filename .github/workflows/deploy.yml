name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy static pages to dist
        run: |
          cp -f website/about-christopher.html dist/ 2>/dev/null || true
          cp -f clients/website-llc/website-llc.html dist/ 2>/dev/null || true
          cp -f projects/restaurant-demo.html dist/ 2>/dev/null || true
          cp -f sitemap.xml dist/ 2>/dev/null || true
          cp -r projects dist/projects 2>/dev/null || true
          cp -r service-areas dist/service-areas 2>/dev/null || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: www.auralisdigital.net
