<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="110" y1="120" x2="1090" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.74 0 0 0 0 0.97 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1040" cy="110" r="180" fill="#1d4ed8" opacity="0.22" filter="url(#glow)"/>
  <circle cx="155" cy="535" r="220" fill="#7c3aed" opacity="0.18" filter="url(#glow)"/>

  <rect x="70" y="70" width="1060" height="490" rx="36" fill="#020617" opacity="0.72" stroke="url(#accent)" stroke-width="3"/>

  <text x="110" y="170" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="4">AURALIS DIGITAL</text>
  <text x="110" y="285" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">Professional Websites</text>
  <text x="110" y="365" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800">for Local Businesses</text>
  <text x="112" y="440" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500">Clean design. Clear contact flows. Real credibility.</text>

  <rect x="110" y="485" width="365" height="52" rx="26" fill="url(#accent)"/>
  <text x="138" y="521" fill="#020617" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">auralisdigital.net</text>
</svg>
